<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!-- 基础元数据设置 -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico" />
  <title>新标签页</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  
  <!-- ============================================
         全局样式定义
         ============================================ -->
  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.12);
      --glass-border: rgba(255, 255, 255, 0.35);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
      --glass-inset: inset 0 1px 0 0 rgba(255, 255, 255, 0.5), inset 0 -1px 0 0 rgba(255, 255, 255, 0.15);
      --radius: 1.25rem;
      --radius-sm: 0.75rem;
      --text: rgba(30, 30, 35, 0.95);
      --text-muted: rgba(60, 60, 70, 0.75);
      --bg-gradient: linear-gradient(165deg, #e8eef6 0%, #dde5f0 35%, #f0f4fb 70%, #e2eaf5 100%);
      --tt-text-light: rgba(30, 30, 35, 0.95);
      --tt-text-dark: rgba(255, 255, 255, 0.92);
      --tt-muted-light: rgba(60, 60, 70, 0.75);
      --tt-muted-dark: rgba(255, 255, 255, 0.65);
      --tt-glass-bg-light: rgba(255, 255, 255, 0.12);
      --tt-glass-bg-dark: rgba(60, 62, 72, 0.35);
      --tt-glass-border-light: rgba(255, 255, 255, 0.35);
      --tt-glass-border-dark: rgba(255, 255, 255, 0.18);
      --tt-search-bg-light: rgba(255, 255, 255, 0.4);
      --tt-search-bg-dark: rgba(255, 255, 255, 0.12);
      --tt-search-border-light: rgba(255, 255, 255, 0.6);
      --tt-search-border-dark: rgba(255, 255, 255, 0.2);
      --tt-search-hover-light: rgba(255, 255, 255, 0.55);
      --tt-search-hover-dark: rgba(255, 255, 255, 0.2);
      --tt-link-bg-light: rgba(255, 255, 255, 0.2);
      --tt-link-bg-dark: rgba(255, 255, 255, 0.1);
      --tt-link-border-light: rgba(255, 255, 255, 0.35);
      --tt-link-border-dark: rgba(255, 255, 255, 0.2);
      --tt-link-hover-light: rgba(255, 255, 255, 0.35);
      --tt-link-hover-dark: rgba(255, 255, 255, 0.18);
      --tt-topbar-bg-light: rgba(255, 255, 255, 0.2);
      --tt-topbar-bg-dark: rgba(255, 255, 255, 0.08);
      --tt-topbar-hover-light: rgba(255, 255, 255, 0.35);
      --tt-topbar-hover-dark: rgba(255, 255, 255, 0.15);
      --tt-glass-after-light: 0.6;
      --tt-glass-after-dark: 0.25;
      --tt-glass-shadow-light: rgba(0, 0, 0, 0.06);
      --tt-glass-shadow-dark: rgba(0, 0, 0, 0.2);
    }
    body.night-mode {
      --glass-bg: rgba(60, 62, 72, 0.35);
      --glass-border: rgba(255, 255, 255, 0.18);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      --glass-inset: inset 0 1px 0 0 rgba(255, 255, 255, 0.12);
      --text: rgba(255, 255, 255, 0.92);
      --text-muted: rgba(255, 255, 255, 0.65);
      --bg-gradient: linear-gradient(165deg, #383a42 0%, #3d3f48 35%, #34363e 70%, #2e3038 100%);
    }

    body.night-mode .glass::after {
      opacity: 0.25;
    }

    body.night-mode .search-engine-toggle,
    body.night-mode .search-btn {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.2);
    }

    body.night-mode .search-engine-toggle:hover,
    body.night-mode .search-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    body.night-mode .link-card {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    body.night-mode .link-card:hover {
      background: rgba(255, 255, 255, 0.18);
    }
    body.theme-transitioning {
      --text: color-mix(in srgb, var(--tt-text-light) calc((1 - var(--theme-t)) * 100%), var(--tt-text-dark) calc(var(--theme-t) * 100%));
      --text-muted: color-mix(in srgb, var(--tt-muted-light) calc((1 - var(--theme-t)) * 100%), var(--tt-muted-dark) calc(var(--theme-t) * 100%));
      --glass-bg: color-mix(in srgb, var(--tt-glass-bg-light) calc((1 - var(--theme-t)) * 100%), var(--tt-glass-bg-dark) calc(var(--theme-t) * 100%));
      --glass-border: color-mix(in srgb, var(--tt-glass-border-light) calc((1 - var(--theme-t)) * 100%), var(--tt-glass-border-dark) calc(var(--theme-t) * 100%));
      --glass-shadow: 0 8px 32px color-mix(in srgb, var(--tt-glass-shadow-light) calc((1 - var(--theme-t)) * 100%), var(--tt-glass-shadow-dark) calc(var(--theme-t) * 100%));
      --glass-inset: inset 0 1px 0 0 color-mix(in srgb, rgba(255, 255, 255, 0.5) calc((1 - var(--theme-t)) * 100%), rgba(255, 255, 255, 0.12) calc(var(--theme-t) * 100%)), inset 0 -1px 0 0 color-mix(in srgb, rgba(255, 255, 255, 0.15) calc((1 - var(--theme-t)) * 100%), rgba(255, 255, 255, 0.12) calc(var(--theme-t) * 100%));
    }
    body.theme-transitioning .glass::after {
      opacity: calc(0.6 - 0.35 * var(--theme-t));
    }
    body.theme-transitioning .search-engine-toggle,
    body.theme-transitioning .search-btn {
      background: color-mix(in srgb, var(--tt-search-bg-light) calc((1 - var(--theme-t)) * 100%), var(--tt-search-bg-dark) calc(var(--theme-t) * 100%));
      border-color: color-mix(in srgb, var(--tt-search-border-light) calc((1 - var(--theme-t)) * 100%), var(--tt-search-border-dark) calc(var(--theme-t) * 100%));
    }
    body.theme-transitioning .search-engine-toggle:hover,
    body.theme-transitioning .search-btn:hover {
      background: color-mix(in srgb, var(--tt-search-hover-light) calc((1 - var(--theme-t)) * 100%), var(--tt-search-hover-dark) calc(var(--theme-t) * 100%));
    }
    body.theme-transitioning .link-card {
      background: color-mix(in srgb, var(--tt-link-bg-light) calc((1 - var(--theme-t)) * 100%), var(--tt-link-bg-dark) calc(var(--theme-t) * 100%));
      border-color: color-mix(in srgb, var(--tt-link-border-light) calc((1 - var(--theme-t)) * 100%), var(--tt-link-border-dark) calc(var(--theme-t) * 100%));
    }
    body.theme-transitioning .link-card:hover {
      background: color-mix(in srgb, var(--tt-link-hover-light) calc((1 - var(--theme-t)) * 100%), var(--tt-link-hover-dark) calc(var(--theme-t) * 100%));
    }
    body.theme-transitioning .top-bar-btn {
      background: color-mix(in srgb, var(--tt-topbar-bg-light) calc((1 - var(--theme-t)) * 100%), var(--tt-topbar-bg-dark) calc(var(--theme-t) * 100%));
    }
    body.theme-transitioning .top-bar-btn:hover {
      background: color-mix(in srgb, var(--tt-topbar-hover-light) calc((1 - var(--theme-t)) * 100%), var(--tt-topbar-hover-dark) calc(var(--theme-t) * 100%));
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      height: 100%;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      min-height: 100%;
      min-height: 100dvh;
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(0.75rem, 4vw, 2rem);
      -webkit-font-smoothing: antialiased;
    }
    .glass {
      position: relative;
      background: var(--glass-bg);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      box-shadow: var(--glass-shadow), var(--glass-inset);
      overflow: hidden;
    }

    .glass::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(165deg, rgba(255,255,255,0.25) 0%, rgba(255,255,255,0.02) 45%, transparent 65%);
      border-radius: var(--radius);
      pointer-events: none;
      opacity: 0.6;
    }
    .main-center {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: min(580px, calc(100vw - 2rem));
      min-height: 0;
    }
    body.lang-switching [data-i18n],
    body.lang-switching .search-input-hint {
      opacity: 0;
      transition: opacity 0.14s ease-out;
    }
    .search-wrap {
      width: 100%;
      margin-bottom: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
    }
    .main-center.edit-empty .search-wrap {
      transform: translateY(-20px);
    }

    .search-bar {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.5rem 0.5rem 1.25rem;
      min-height: 56px;
      overflow: visible;
    }

    .search-engine-toggle {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.4rem 0.5rem;
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.6);
      cursor: pointer;
      font-size: 0.8rem;
      color: var(--text-muted);
      flex-shrink: 0;
      transition: background 0.2s, color 0.2s;
    }

    .search-engine-toggle .engine-toggle-label {
      display: none;
    }

    .search-engine-toggle:hover {
      background: rgba(255, 255, 255, 0.55);
      color: var(--text);
    }

    .search-engine-toggle svg {
      width: 18px;
      height: 18px;
      opacity: 0.9;
    }

    .search-form {
      flex: 1;
      display: flex;
      align-items: center;
      min-width: 0;
    }

    .search-input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: none;
      background: transparent;
      font-size: 1rem;
      color: var(--text);
      outline: none;
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .search-btn {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.5);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.15s;
    }

    .search-btn:hover {
      background: rgba(255, 255, 255, 0.7);
      transform: scale(1.02);
    }

    .search-btn svg {
      width: 20px;
      height: 20px;
    }
    .search-engine-wrap {
      overflow: visible;
    }

    .engine-dropdown {
      position: fixed;
      min-width: 180px;
      padding: 0.5rem;
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border: 1px solid var(--glass-border);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08), inset 0 1px 0 0 rgba(255, 255, 255, 0.4);
      z-index: 1000;
      display: none;
    }

    body.night-mode .engine-dropdown {
      background: rgba(40, 40, 48, 0.9);
      border-color: rgba(255, 255, 255, 0.1);
    }

    .engine-dropdown.show {
      display: block;
    }

    .engine-option {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 0.85rem;
      margin-bottom: 0.25rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--text);
      transition: background 0.15s, box-shadow 0.15s;
      position: relative;
      isolation: isolate;
    }

    .engine-option:last-child {
      margin-bottom: 0;
    }

    .engine-option:hover {
      background: rgba(255, 255, 255, 0.35);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    body.night-mode .engine-option:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .engine-option.active {
      background: rgba(255, 255, 255, 0.4);
      font-weight: 500;
    }

    body.night-mode .engine-option.active {
      background: rgba(255, 255, 255, 0.15);
    }
    .quick-links-wrap {
      width: 100%;
      max-width: min(580px, calc(100vw - 2rem));
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .quick-links-toolbar {
      display: none;
    }

    .link-add-btn {
      flex-shrink: 0;
    }

    .link-add-btn .link-add-inner {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--text);
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    .link-add-btn .link-add-inner:hover {
      background: rgba(255, 255, 255, 0.35);
      transform: scale(1.08);
    }
    .main-center.edit-empty .link-add-btn {
      opacity: 0;
      transition: opacity 0.3s ease-out;
    }
    .main-center.edit-empty .link-add-btn.visible {
      opacity: 1;
    }

    body.night-mode .link-add-btn .link-add-inner {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .link-add-btn .link-add-inner svg {
      width: 24px;
      height: 24px;
    }

    .btn-edit, .btn-add {
      padding: 0.4rem 0.75rem;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.25);
      color: var(--text);
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-edit:hover, .btn-add:hover {
      background: rgba(255, 255, 255, 0.4);
    }

    .links-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
    }

    .link-item {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .link-card {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--text);
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      flex-shrink: 0;
    }

    .link-card:hover {
      background: rgba(255, 255, 255, 0.35);
      transform: scale(1.08);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
    }

    .link-card img.link-favicon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      object-fit: contain;
    }

    .link-card .link-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      background: rgba(255, 255, 255, 0.4);
    }

    .link-item .btn-delete {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: none;
      background: rgba(220, 60, 60, 0.9);
      color: #fff;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .quick-links-wrap.edit-mode .link-item .btn-delete {
      display: flex;
    }
    .quick-links-wrap.edit-mode .link-item .link-card,
    .quick-links-wrap.edit-mode .link-item .link-add-inner,
    .quick-links-wrap.edit-mode .link-item .btn-delete {
      animation: edit-wiggle 0.18s ease-in-out infinite;
    }
    @keyframes edit-wiggle {
      0%, 100% { transform: rotate(-0.9deg); }
      50% { transform: rotate(0.9deg); }
    }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-overlay.show {
      display: flex;
    }
    .modal {
      position: relative;
      background: var(--glass-bg);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 1.5rem;
      min-width: 320px;
      box-shadow: var(--glass-shadow), var(--glass-inset);
    }

    body:not(.night-mode) .modal {
      background: rgba(255, 255, 255, 0.88);
      border-color: rgba(255, 255, 255, 0.6);
      box-shadow: 0 20px 56px rgba(0, 0, 0, 0.1), inset 0 1px 0 0 rgba(255, 255, 255, 0.8);
    }

    .modal::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(165deg, rgba(255,255,255,0.2) 0%, transparent 50%);
      border-radius: var(--radius);
      pointer-events: none;
      opacity: 0.5;
    }

    body.night-mode .modal::after {
      opacity: 0.15;
    }

    .modal h3 {
      font-size: 1rem;
      margin-bottom: 1rem;
      color: var(--text);
    }

    .modal label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
    }

    .modal input {
      width: 100%;
      padding: 0.6rem 0.85rem;
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.25);
      color: var(--text);
      font-size: 0.95rem;
      margin-bottom: 1rem;
      box-sizing: border-box;
      backdrop-filter: blur(8px);
      outline: none;
    }

    .modal input:focus {
      border-color: rgba(255, 255, 255, 0.55);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.25);
    }

    body.night-mode .modal input {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
    }

    body.night-mode .modal input:focus {
      border-color: rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.12);
    }

    .modal-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
    }

    .modal-actions button {
      padding: 0.5rem 1rem;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.3);
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .modal-actions button:hover {
      background: rgba(255, 255, 255, 0.45);
    }

    .modal-actions button.primary {
      background: rgba(255, 255, 255, 0.5);
      font-weight: 500;
    }

    body.night-mode .modal-actions button {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.2);
    }

    body.night-mode .modal-actions button.primary {
      background: rgba(255, 255, 255, 0.25);
    }
    .undo-toast {
      position: fixed;
      bottom: clamp(1rem, 4vw, 2rem);
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 1rem;
      background: var(--glass-bg);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      box-shadow: var(--glass-shadow);
      z-index: 1100;
      opacity: 0;
      visibility: hidden;
      transition: transform 0.3s, opacity 0.3s, visibility 0.3s;
    }

    .undo-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
      visibility: visible;
    }

    .undo-toast .undo-toast-msg {
      font-size: 0.875rem;
      color: var(--text);
    }

    .undo-toast .undo-toast-btn {
      padding: 0.35rem 0.65rem;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.4);
      color: var(--text);
      font-size: 0.8rem;
      cursor: pointer;
      font-weight: 500;
    }

    .engine-icon-wrap {
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .engine-icon-img {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      object-fit: contain;
      display: block;
    }

    .engine-icon-img[src=""],
    .engine-icon-img:not([src]) {
      display: none;
    }

    .engine-icon-fallback {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: var(--text-muted);
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      border-radius: 4px;
    }

    .engine-icon-fallback.show {

  <script>
    const DEFAULT_ENGINES = [
      { id: 'bing', name: 'Bing 必应', url: 'https://www.bing.com/search?q={q}', builtin: true },
      { id: 'google', name: 'Google 谷歌', url: 'https://www.google.com/search?q={q}', builtin: true },
      { id: 'baidu', name: 'Baidu 百度', url: 'https://www.baidu.com/s?wd={q}', builtin: true }
    ];

    const STORAGE_ENGINES = 'navSearchEngines';
    const STORAGE_ENGINE_CURRENT = 'navSearchEngineCurrent';

    function getEngines() {
      try {
        const raw = localStorage.getItem(STORAGE_ENGINES);
        if (raw) {
          const arr = JSON.parse(raw);
          if (Array.isArray(arr) && arr.length) return arr;
        }
      } catch (e) {}
      return DEFAULT_ENGINES.map(e => ({ ...e }));
    }

    function saveEngines(engines) {
      localStorage.setItem(STORAGE_ENGINES, JSON.stringify(engines));
    }

    var SEARCH_ENGINE_TEMPLATES = {
      'baidu.com': { name: '百度', searchUrl: 'https://www.baidu.com/s?wd={q}' },
      'www.baidu.com': { name: '百度', searchUrl: 'https://www.baidu.com/s?wd={q}' },
      'google.com': { name: 'Google 谷歌', searchUrl: 'https://www.google.com/search?q={q}' },
      'www.google.com': { name: 'Google 谷歌', searchUrl: 'https://www.google.com/search?q={q}' },
      'google.com.hk': { name: 'Google 谷歌', searchUrl: 'https://www.google.com.hk/search?q={q}' },
      'bing.com': { name: 'Bing 必应', searchUrl: 'https://www.bing.com/search?q={q}' },
      'www.bing.com': { name: 'Bing 必应', searchUrl: 'https://www.bing.com/search?q={q}' },
      'sogou.com': { name: '搜狗搜索', searchUrl: 'https://www.sogou.com/web?query={q}' },
      'www.sogou.com': { name: '搜狗搜索', searchUrl: 'https://www.sogou.com/web?query={q}' },
      'so.com': { name: '360 搜索', searchUrl: 'https://www.so.com/s?q={q}' },
      'www.so.com': { name: '360 搜索', searchUrl: 'https://www.so.com/s?q={q}' },
      'duckduckgo.com': { name: 'DuckDuckGo', searchUrl: 'https://duckduckgo.com/?q={q}' },
      'www.duckduckgo.com': { name: 'DuckDuckGo', searchUrl: 'https://duckduckgo.com/?q={q}' },
      'yahoo.com': { name: 'Yahoo', searchUrl: 'https://search.yahoo.com/search?p={q}' },
      'search.yahoo.com': { name: 'Yahoo', searchUrl: 'https://search.yahoo.com/search?p={q}' },
      'yandex.com': { name: 'Yandex', searchUrl: 'https://yandex.com/search/?text={q}' },
      'yandex.ru': { name: 'Yandex', searchUrl: 'https://yandex.ru/search/?text={q}' },
      'www.yandex.ru': { name: 'Yandex', searchUrl: 'https://yandex.ru/search/?text={q}' },
      'ecosia.org': { name: 'Ecosia', searchUrl: 'https://www.ecosia.org/search?q={q}' },
      'www.ecosia.org': { name: 'Ecosia', searchUrl: 'https://www.ecosia.org/search?q={q}' },
      'metaso.cn': { name: '秘塔 AI', searchUrl: 'https://metaso.cn/search?q={q}' },
      'www.metaso.cn': { name: '秘塔 AI', searchUrl: 'https://metaso.cn/search?q={q}' }
    };

    function normalizeEngineInput(inputUrl, inputName) {
      var raw = (inputUrl || '').trim().toLowerCase();
      if (!raw) return null;
      var domain = '';
      if (/^https?:\/\//i.test(raw)) {
        try {
          var u = new URL(raw);
          domain = u.hostname.replace(/^www\./, '');
        } catch (e) {
          domain = raw.replace(/^https?:\/\//, '').replace(/\/.*$/, '').replace(/^www\./, '');
        }
      } else {
        domain = raw.replace(/\/.*$/, '').replace(/^www\./, '');
      }
      if (!domain) return null;
      var withWww = 'www.' + domain;
      var template = SEARCH_ENGINE_TEMPLATES[domain] || SEARCH_ENGINE_TEMPLATES[withWww];
      if (template) {
        return { name: inputName && inputName.trim() ? inputName.trim() : template.name, searchUrl: template.searchUrl };
      }
      if (raw.includes('{q}')) {
        var u = inputUrl.trim();
        return { name: inputName && inputName.trim() ? inputName.trim() : domain, searchUrl: /^https?:\/\//i.test(u) ? u : 'https://' + u.replace(/^\/+/, '') };
      }
      var host = domain.includes('.') ? domain : 'www.' + domain;
      return { name: inputName && inputName.trim() ? inputName.trim() : domain, searchUrl: 'https://' + host + '/search?q={q}' };
    }

    function getSearchUrl(engine, q) {
      const encoded = encodeURIComponent(q);
      const url = (engine.url || '').trim();
      if (url.includes('baidu.com')) {
        return 'https://www.baidu.com/s?wd=' + encoded;
      }
      return url.replace(/\{q\}/g, encoded);
    }

    function getEngineDomain(url) {
      if (!url || typeof url !== 'string') return '';
      try {
        var u = new URL(url.includes('://') ? url : 'https://' + url);
        return u.hostname.replace(/^www\./, '');
      } catch (e) {
        return '';
      }

    function getDomain(url) {

      } catch {

    function isNightByTime() {

    function applyNightMode() {

      var on = mode === 'on' || (mode === 'auto' && isNightByTime());

    }
    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }
    function easeInCubic(t) {
      return t * t * t;
    }
    function runThemeSpread(btn, toNight) {
      if (document.querySelector('.theme-spread-overlay')) return;
      var DURATION = toNight ? 880 : 1050;
      document.body.classList.add('theme-transitioning', toNight ? 'theme-transitioning-to-night' : 'theme-transitioning-to-light');
      document.body.style.setProperty('--theme-t', toNight ? '0' : '1');
      var rect = btn.getBoundingClientRect();
      var cx = rect.left + rect.width / 2;
      var cy = rect.top + rect.height / 2;
      var diag = Math.sqrt(window.innerWidth * window.innerWidth + window.innerHeight * window.innerHeight);
      var size = diag * 2;
      var overlay = document.createElement('div');
      overlay.className = 'theme-spread-overlay' + (toNight ? '' : ' theme-spread-to-light');
      overlay.style.left = (cx - size / 2) + 'px';
      overlay.style.top = (cy - size / 2) + 'px';
      overlay.style.width = size + 'px';
      overlay.style.height = size + 'px';
      overlay.style.background = toNight
        ? 'linear-gradient(165deg, #383a42 0%, #3d3f48 35%, #34363e 70%, #2e3038 100%)'
        : 'linear-gradient(165deg, #e8eef6 0%, #dde5f0 35%, #f0f4fb 70%, #e2eaf5 100%)';
      overlay.style.backgroundAttachment = 'fixed';
      document.body.appendChild(overlay);
      requestAnimationFrame(function () {
        overlay.classList.add('theme-spread-run');
      });
      var start = null;
      function tick(now) {
        if (start == null) start = now;
        var elapsed = now - start;
        var t = Math.min(elapsed / DURATION, 1);
        var eased = toNight ? easeOutCubic(t) : (1 - easeInCubic(t));
        document.body.style.setProperty('--theme-t', String(eased));
        if (elapsed < DURATION) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
      overlay.addEventListener('animationend', function onEnd() {
        overlay.removeEventListener('animationend', onEnd);
        document.body.classList.toggle('night-mode', toNight);
        localStorage.setItem(STORAGE_NIGHT, toNight ? 'on' : 'off');
        overlay.classList.add('theme-spread-fade-out');
        overlay.addEventListener('transitionend', function onFadeEnd(e) {
          if (e.propertyName !== 'opacity') return;
          overlay.removeEventListener('transitionend', onFadeEnd);
          requestAnimationFrame(function () {
            document.body.classList.remove('theme-transitioning', 'theme-transitioning-to-night', 'theme-transitioning-to-light');
            document.body.style.removeProperty('--theme-t');
            overlay.remove();
          });
        });
      });
    }

      const name = engineEditName.value.trim();
      const url = engineEditUrl.value.trim();
      if (!name || !url || !url.includes('{q}') || editingEngineIndex < 0) return;
      const engines = getEngines();
      engines[editingEngineIndex] = { ...engines[editingEngineIndex], name, url };
      saveEngines(engines);
      renderEngineDropdown();
      setEngineById(engines[editingEngineIndex].id);
      engineEditModal.classList.remove('show');
      openEngineModal();
    });
  </script>
</body>
</html>
